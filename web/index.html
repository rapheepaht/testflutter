<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="testflutter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>testflutter</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- System fonts for offline support - no network required -->
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }
    
    /* Fallback message while Flutter is loading */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: inherit;
      color: #333;
      background-color: #f5f5f5;
    }
  </style>
</head>
<body>
  <div id="loading">
    <p>Opening Smart Vision Journal...</p>
  </div>
  
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // Register service worker for offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service_worker.js')
          .then(reg => {
            console.log('[App] Service worker registered:', reg);
          })
          .catch(err => {
            console.warn('[App] Service worker registration failed:', err);
          });
      });
    }

    // Suppress font loading errors on console to prevent blocking startup
    // This allows the app to render with system fonts when network is unavailable
    const originalError = console.error;
    const originalWarn = console.warn;
    
    console.error = function(...args) {
      const message = args[0]?.toString?.() || '';
      // Suppress font loading and CanvasKit errors
      if (message.includes('Failed to load font') || 
          message.includes('gstatic.com') ||
          message.includes('Failed to fetch dynamically')) {
        console.log('[Offline] Suppressing external resource error:', message.substring(0, 80));
        return;
      }
      originalError.apply(console, args);
    };

    console.warn = function(...args) {
      const message = args[0]?.toString?.() || '';
      if (message.includes('Failed to load font') || 
          message.includes('gstatic.com')) {
        console.log('[Offline] Using system fonts instead:', message.substring(0, 80));
        return;
      }
      originalWarn.apply(console, args);
    };
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
